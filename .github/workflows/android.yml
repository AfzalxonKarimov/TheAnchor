name: Android AAB Build

on:
  push:
    branches: [main, security-clean-initial]
  workflow_dispatch:
    inputs:
      version_code:
        description: 'Version code (integer)'
        required: true
        type: string
      version_name:
        description: 'Version name (e.g. 1.0.1)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build Android App Bundle
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 35
          ndk-version: r27c
          cmdline-tools-version: latest

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          EXPO_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_CLIENT_ID }}

      - name: Make gradlew executable
        run: chmod +x ./gradlew
        working-directory: ./android

      - name: Set version from workflow_dispatch input
        if: github.event.inputs.version_code != ''
        run: |
          sed -i "s/versionCode [0-9]*/versionCode ${{ github.event.inputs.version_code }}/" app/build.gradle
          sed -i "s/versionName \".*\"/versionName \"${{ github.event.inputs.version_name }}\"/" app/build.gradle
        working-directory: ./android

      - name: Decode Keystore
        id: decode_keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > theanchor-release.keystore
          echo "keystore_path=$(pwd)/theanchor-release.keystore" >> $GITHUB_OUTPUT
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build Android App Bundle (release, signed)
        run: ./gradlew :app:bundleRelease
        working-directory: ./android
        env:
          KEYSTORE_PATH: ${{ steps.decode_keystore.outputs.keystore_path }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload release AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-bundle-release-signed
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30